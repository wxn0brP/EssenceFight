<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark light">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>Essence Fight</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="loader.css">
</head>

<body>
    <div id="view-game" style="display: none;">
        <div id="boards">
            <!-- include board -->
            <!-- include board -->
        </div>
        <div id="game-controls">
            <div id="game-controls-buttons">
                <button data-id="end-turn">End Turn</button>
            </div>
            <div id="unused-cards">
                <div id="unused-cards-container"></div>
                <div id="unused-cards-overlay"></div>
            </div>
        </div>
        <div id="game-notification" class="notification-overlay" style="display: none;">
            <div class="notification-content">
                <h1 id="notification-title">VICTORY</h1>
                <p id="notification-message">You have defeated your opponent!</p>
                <div id="notification-actions">
                    <button id="notification-close">Continue</button>
                </div>
            </div>
        </div>
        <div id="turn-banner">YOUR TURN</div>
    </div>

    <div id="match-proposal" class="notification-overlay" style="display: none;">
        <div class="notification-content">
            <h1>Match Found</h1>
            <p>Wait, this match seems unfair (MMR difference > 40).</p>
            <p>Do you want to proceed?</p>
            <div class="match-actions" style="display: flex; gap: 1rem; justify-content: center;">
                <button id="match-accept" style="background: var(--accent);">Accept</button>
                <button id="match-decline" style="background: #e74c3c;">Decline</button>
            </div>
        </div>
    </div>
    <div id="loader" style="display: none;">
        <div class="loader"></div>
    </div>
    <div id="view-main">
        <header>
            <div style="display: flex; align-items: center; gap: 3rem;">
                <div>
                    ESSENCE
                    <br>
                    FIGHT
                </div>
                <div id="user">
                    <img id="user-avatar" src="/favicon.ico" alt="avatar">
                    <div id="user-name" title="Double click to edit"></div>
                </div>
            </div>
            <div id="ep">
                <div id="ep-rank"></div>
                <div id="ep-bar">
                    <div id="ep-bar-fill"></div>
                </div>
            </div>
        </header>
        <div id="main">
            <div id="deck-builder">
                <h3>Select Cards</h3>
                <div id="available-cards" class="card-grid"></div>
                <div class="deck-controls">
                    <span id="deck-count">Selected: 0/15</span>
                    <button id="search-game">Search Game</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="init.js"></script>
</body>

</html>
