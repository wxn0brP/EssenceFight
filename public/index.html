<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark light">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>Essence Fight</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="loader.css">
</head>

<body>
    <div id="view-game" style="display: none;">
        <div id="boards">
            <!-- include board -->
            <!-- include board -->
        </div>
        <div id="game-controls">
            <div id="game-controls-buttons">
                <button data-id="end-turn">End Turn</button>
            </div>
            <div id="unused-cards"></div>
        </div>
    </div>
    <div id="loader" style="display: none;">
        <div class="loader"></div>
    </div>
    <div id="view-main">
        <header>
            <div style="display: flex; align-items: center; gap: 3rem;">
                <div>
                    ESSENCE
                    <br>
                    FIGHT
                </div>
                <div id="user">
                    <img id="user-avatar" src="/favicon.ico" alt="avatar">
                    <div id="user-name"></div>
                </div>
            </div>
            <div id="ep">
                <div id="ep-rank"></div>
                <div id="ep-bar">
                    <div id="ep-bar-fill"></div>
                </div>
            </div>
        </header>
        <div id="main">
            <button id="search-game">Search</button>
        </div>
    </div>

    <script type="module" src="init.js"></script>
</body>

</html>
